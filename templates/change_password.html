<{% extends "base.html" %}
{% block title %}Change Password | Sepsis Risk Predictor{% endblock %}

{% block content %}
<style>
  .password-container {
    max-width: 480px;
    margin: 60px auto;
    background: rgba(17, 24, 39, 0.85);
    padding: 30px;
    border-radius: 14px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }

  .password-container h2 {
    text-align: center;
    margin-bottom: 25px;
    font-weight: 700;
  }

  label {
    font-size: 0.9rem;
    color: #ddd;
  }

  input {
    background: #111827;
    border: 1px solid #374151;
    color: #fff;
  }

  input:focus {
    border-color: #00e6e6;
    box-shadow: none;
  }

  .btn-primary {
    width: 100%;
    margin-top: 15px;
    background-color: #00e6e6;
    border: none;
    color: #000;
    font-weight: 600;
  }

  .btn-primary:hover {
    background-color: #00cccc;
  }
</style>

<div class="password-container">
  <h2>🔐 Change Password</h2>

  <form method="POST">
    <div class="mb-3">
      <label for="current_password">Current Password</label>
      <input
        type="password"
        name="current_password"
        id="current_password"
        class="form-control"
        required
      >
    </div>

    <div class="mb-3">
      <label for="new_password">New Password</label>
      <input
        type="password"
        name="new_password"
        id="new_password"
        class="form-control"
        required
      >
    </div>

    <div class="mb-3">
      <label for="confirm_password">Confirm New Password</label>
      <input
        type="password"
        name="confirm_password"
        id="confirm_password"
        class="form-control"
        required
      >
    </div>

    <button type="submit" class="btn btn-primary">
      Update Password
    </button>
  </form>
</div>
{% endblock %}
